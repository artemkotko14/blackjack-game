<html>

<head>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="start-screen" class="container">
        <h1>Welcome to Blackjack</h1>
        <img src="./images/blackjack-main-img.jpg" alt="King and Ace of Spades" id="start-img">
        <input type="text" id="name-input" placeholder="Enter your name">
        <button id="start-btn">START GAME</button>
    </div>
    <div id="game-screen" class="container">
        <h1 id="game-screen-header">Blackjack</h1>
        <p id="message-el"></p>
        <div class="cards-container">
            <!-- Player cards -->
            <div id="player-cards">

                <div class="cards-section">
                    <p id="cards-el">Your Cards:</p>
                    <div id="player-cards-images-el" class="cards-images"></div>
                    <p id="sum-el">Your Sum:</p>
                </div>
            </div>

            <!-- Dealer cards -->
            <div id="dealer-cards">
                <div class="cards-section">
                    <p id="dealer-cards-el">Dealer's Cards:</p>
                    <div id="dealer-cards-images-el" class="cards-images"></div>
                    <p id="dealer-sum-el">Dealer's Sum:</p>
                </div>
            </div>
        </div>
        <button id="deal-btn">DEAL CARDS</button>
        <div class="player-options">
            <button id="hit-btn">HIT</button>
            <button id="stand-btn">STAND</button>
        </div>

        <button id="restart-btn">Back to Start Page</button>

        <p id="balance-el"></p>
    </div>

    <script type="module" src="index.js"></script>
</body>

</html>
